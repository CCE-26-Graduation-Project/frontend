<!doctype html>
<html data-palette="clear-sky">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_shared.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 14px; }
  .tok { display: flex; flex-direction: column; align-items: flex-start; gap: 8px; }
  .box { background: var(--accent); border-radius: 4px; }
  .name { font: 600 11.5px/1.2 var(--font-sans); color: var(--text-1); }
  .val { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-2); }
  .heading { font: 700 18px/1.2 var(--font-sans); letter-spacing: -0.018em; }
  .note { font: 400 12.5px/1.4 var(--font-sans); color: var(--text-2); }
</style>
</head>
<body>
<div class="card">
  <div>
    <div class="heading">Spacing scale</div>
    <div class="note">Base unit 4pt. Every margin, gap, padding, and radius is a multiple.</div>
  </div>
  <div class="grid">
    <div class="tok"><div class="box" style="width:4px;height:32px"></div><div class="name">space-1</div><div class="val">4pt</div></div>
    <div class="tok"><div class="box" style="width:8px;height:32px"></div><div class="name">space-2</div><div class="val">8pt</div></div>
    <div class="tok"><div class="box" style="width:12px;height:32px"></div><div class="name">space-3</div><div class="val">12pt</div></div>
    <div class="tok"><div class="box" style="width:16px;height:32px"></div><div class="name">space-4</div><div class="val">16pt</div></div>
    <div class="tok"><div class="box" style="width:20px;height:32px"></div><div class="name">space-5</div><div class="val">20pt</div></div>
    <div class="tok"><div class="box" style="width:24px;height:32px"></div><div class="name">space-6</div><div class="val">24pt</div></div>
    <div class="tok"><div class="box" style="width:32px;height:32px"></div><div class="name">space-8</div><div class="val">32pt</div></div>
  </div>
</div>
</body></html>
