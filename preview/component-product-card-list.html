<!doctype html>
<html data-palette="clear-sky">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_shared.css">
<style>
  body { padding: 24px; }
  .list { display: flex; flex-direction: column; gap: 12px; }
  .row {
    background: var(--surface); border-radius: 16px; padding: 14px;
    display: grid; grid-template-columns: 80px 1fr auto; gap: 14px; align-items: center;
    box-shadow: var(--shadow-card);
  }
  .thumb { width: 80px; height: 80px; border-radius: 12px;
    background: linear-gradient(135deg, var(--bg-2), color-mix(in oklab, var(--accent) 20%, var(--bg-2)));
    position: relative; flex-shrink: 0;
  }
  .thumb .obj {
    position: absolute; inset: 18%; border-radius: 8px;
    background: color-mix(in oklab, var(--accent) 35%, white);
  }
  .meta { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .pname { font: 600 16px/1.25 var(--font-sans); letter-spacing: -0.012em; color: var(--text-1);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .specs { font: 400 13px/1.3 var(--font-sans); color: var(--text-2); }
  .range {
    font-family: var(--font-mono); font-variant-numeric: tabular-nums;
    font-weight: 600; font-size: 19px; line-height: 1; color: var(--savings);
    letter-spacing: -0.005em; margin-top: 4px;
  }
  .stores-line {
    display: flex; align-items: center; gap: 6px; margin-top: 2px;
    font: 500 12px/1.2 var(--font-sans); color: var(--text-2);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .stores-line .dot { width: 3px; height: 3px; border-radius: 999px; background: var(--text-2); opacity: 0.5; flex-shrink: 0; }
  .badge { font: 600 11px/1 var(--font-sans); background: var(--bg-2); color: var(--text-2); padding: 5px 10px; border-radius: 999px; }
</style>
</head>
<body>
<div class="card">
  <div class="list">
    <div class="row">
      <div class="thumb"><div class="obj"></div></div>
      <div class="meta">
        <div class="pname">LG OLED C3 65" 4K TV</div>
        <div class="specs">OLED · 120Hz · webOS 23</div>
        <div class="range">$1,499 – $2,199</div>
        <div class="stores-line">
          <span>Best Buy</span><span class="dot"></span>
          <span>LG.com</span><span class="dot"></span>
          <span>Amazon</span>
        </div>
      </div>
      <span class="badge">23 stores</span>
    </div>
  </div>
</div>
</body></html>
