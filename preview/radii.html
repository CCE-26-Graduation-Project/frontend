<!doctype html>
<html data-palette="clear-sky">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_shared.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .tok { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 68px; height: 68px; background: var(--bg-2); border: 1px solid var(--divider); }
  .name { font: 600 12px/1.2 var(--font-sans); color: var(--text-1); }
  .val { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-2); }
  .desc { font: 400 11px/1.3 var(--font-sans); color: var(--text-2); text-align: center; }
  .heading { font: 700 18px/1.2 var(--font-sans); letter-spacing: -0.018em; }
</style>
</head>
<body>
<div class="card">
  <div class="heading">Corner radii</div>
  <div class="grid">
    <div class="tok"><div class="box" style="border-radius:8px"></div><div class="name">chip</div><div class="val">8pt</div><div class="desc">chips, tags, badges</div></div>
    <div class="tok"><div class="box" style="border-radius:12px"></div><div class="name">compact</div><div class="val">12pt</div><div class="desc">list thumbnails</div></div>
    <div class="tok"><div class="box" style="border-radius:16px"></div><div class="name">card</div><div class="val">16pt</div><div class="desc">primary cards</div></div>
    <div class="tok"><div class="box" style="border-radius:24px 24px 0 0; height:48px; margin-top:20px"></div><div class="name">nav</div><div class="val">24pt</div><div class="desc">bottom nav top</div></div>
    <div class="tok"><div class="box" style="border-radius:999px; height:40px; margin-top:14px; width:68px"></div><div class="name">pill</div><div class="val">∞</div><div class="desc">buttons, compare</div></div>
  </div>
</div>
</body></html>
