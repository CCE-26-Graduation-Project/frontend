<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_shared.css">
<style>
  body { padding: 24px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 12px 6px; background: var(--bg-2); border-radius: 12px; }
  .name { font: 600 11.5px/1 var(--font-sans); color: var(--text-1); text-transform: capitalize; }
</style>
</head>
<body>
<div class="card">
  <div class="grid" id="grid"></div>
</div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="../assets/character/Snoop.jsx"></script>
<script type="text/babel">
  function Grid() {
    return SNOOP_EXPRESSIONS.map(e => (
      <div className="cell" key={e}>
        <Snoop expression={e} size={108} />
        <div className="name">{e}</div>
      </div>
    ));
  }
  ReactDOM.createRoot(document.getElementById('grid')).render(<Grid />);
</script>
</body></html>
