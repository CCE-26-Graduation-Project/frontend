<!doctype html>
<html data-palette="clear-sky">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_shared.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .tok { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 20px 8px 8px; }
  .box { width: 96px; height: 64px; background: var(--bg-2); border-radius: 12px; }
  .name { font: 600 12px/1.2 var(--font-sans); color: var(--text-1); }
  .val { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-2); text-align: center; }
  .heading { font: 700 18px/1.2 var(--font-sans); letter-spacing: -0.018em; }
  .note { font: 400 12.5px/1.4 var(--font-sans); color: var(--text-2); }
</style>
</head>
<body>
<div class="card">
  <div>
    <div class="heading">Elevation</div>
    <div class="note">Shadows are tinted with the palette accent. Cards have almost no shadow — depth comes from the bg-1 / bg-2 step.</div>
  </div>
  <div class="grid">
    <div class="tok"><div class="box"></div><div class="name">resting</div><div class="val">flat on bg-2</div></div>
    <div class="tok"><div class="box" style="box-shadow:var(--shadow-rest)"></div><div class="name">rest</div><div class="val">0 1 2 · 6%</div></div>
    <div class="tok"><div class="box" style="box-shadow:var(--shadow-card)"></div><div class="name">card</div><div class="val">0 2 8 · 8%</div></div>
    <div class="tok"><div class="box" style="box-shadow:var(--shadow-floating)"></div><div class="name">floating</div><div class="val">0 8 24 · 12%</div></div>
  </div>
</div>
</body></html>
