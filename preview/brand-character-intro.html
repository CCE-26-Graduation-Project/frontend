<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_shared.css">
<style>
  body { padding: 24px; background: var(--bg-1); }
  .row { display: flex; align-items: center; justify-content: center; gap: 24px; }
  .stage {
    width: 100%; padding: 20px 24px; border-radius: 16px;
    background: var(--bg-2); display: flex; align-items: center; gap: 20px;
  }
  .bubble {
    flex: 1; background: #fff; border-radius: 18px; padding: 14px 18px;
    position: relative; box-shadow: var(--shadow-card);
  }
  .bubble::before {
    content: ""; position: absolute; left: -8px; top: 22px;
    width: 16px; height: 16px; background: #fff; transform: rotate(45deg);
    border-radius: 3px; box-shadow: -2px 2px 4px rgba(30,43,77,0.06);
  }
  .greeting { font: 600 17px/1.3 var(--font-sans); color: var(--text-1); letter-spacing: -0.012em; }
  .sub { font: 400 14px/1.4 var(--font-sans); color: var(--text-2); margin-top: 4px; }
</style>
</head>
<body>
<div class="card">
  <div class="stage">
    <div id="snoop-mount"></div>
    <div class="bubble">
      <div class="greeting">Hi, I'm Snoop.</div>
      <div class="sub">I'll sniff out the lowest price across thousands of stores — just say what you're looking for.</div>
    </div>
  </div>
</div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="../assets/character/Snoop.jsx"></script>
<script type="text/babel">
  ReactDOM.createRoot(document.getElementById("snoop-mount")).render(
    <Snoop expression="waving" size={130} />
  );
</script>
</body></html>
