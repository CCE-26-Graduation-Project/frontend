<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_shared.css">
<style>
  body { padding: 32px 24px; background: var(--bg-1); }
  .row { display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
  .demo { display: flex; flex-direction: column; align-items: flex-start; gap: 8px; }
  .mono-bg { background: var(--bg-2); padding: 18px 22px; border-radius: 14px; box-shadow: var(--shadow-card); }
  .dark-bg { background: var(--text-1); padding: 18px 22px; border-radius: 14px; }
  .label { font: 600 11px/1.2 var(--font-sans); color: var(--text-2); letter-spacing: 0.08em; text-transform: uppercase; }

  .wm {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
    font-weight: 600; font-size: 38px; letter-spacing: -0.04em;
  }
  .wm.light { color: var(--text-1); }
  .wm.dark  { color: #fff; }
  .wm .paws { width: 32px; height: 22px; }
  .wm.light .paws { fill: var(--accent); }
  .wm.dark  .paws { fill: #FFEBCC; }

  .mono {
    width: 64px; height: 64px; border-radius: 16px; background: var(--bg-2);
    display: inline-flex; align-items: center; justify-content: center;
    font: 700 42px/1 -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--text-1); letter-spacing: -0.04em; position: relative;
  }
  .mono .paws { position: absolute; top: 10px; right: 8px; width: 22px; height: 14px; fill: var(--accent); }
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="demo">
      <div class="label">Wordmark — light</div>
      <div class="mono-bg">
        <span class="wm light">
          Snoop
          <svg class="paws" viewBox="0 0 42 22">
            <ellipse cx="6" cy="10" rx="3" ry="4" />
            <ellipse cx="14" cy="6" rx="3" ry="4" />
            <ellipse cx="22" cy="10" rx="3" ry="4" />
            <path d="M7 17 C 7 22, 23 22, 23 17 C 23 13, 19 12, 15 12 C 11 12, 7 13, 7 17 Z" />
          </svg>
        </span>
      </div>
    </div>
    <div class="demo">
      <div class="label">Wordmark — dark</div>
      <div class="dark-bg">
        <span class="wm dark">
          Snoop
          <svg class="paws" viewBox="0 0 42 22">
            <ellipse cx="6" cy="10" rx="3" ry="4" />
            <ellipse cx="14" cy="6" rx="3" ry="4" />
            <ellipse cx="22" cy="10" rx="3" ry="4" />
            <path d="M7 17 C 7 22, 23 22, 23 17 C 23 13, 19 12, 15 12 C 11 12, 7 13, 7 17 Z" />
          </svg>
        </span>
      </div>
    </div>
    <div class="demo">
      <div class="label">Monogram</div>
      <div class="mono">S
        <svg class="paws" viewBox="0 0 22 14">
          <ellipse cx="3" cy="6" rx="2" ry="2.6"/>
          <ellipse cx="9" cy="3" rx="2" ry="2.6"/>
          <ellipse cx="15" cy="6" rx="2" ry="2.6"/>
          <path d="M4 11 C 4 14, 14 14, 14 11 C 14 8, 11 7, 9 7 C 7 7, 4 8, 4 11 Z"/>
        </svg>
      </div>
    </div>
  </div>
</div>
</body></html>
