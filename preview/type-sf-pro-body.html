<!doctype html>
<html data-palette="clear-sky">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_shared.css">
<style>
  .stack { display: grid; gap: 14px; }
  .specimen { display: grid; grid-template-columns: 130px 1fr; align-items: baseline; gap: 16px; }
  .tag { font: 600 11px/1.2 var(--font-mono); color: var(--text-2); }
</style>
</head>
<body>
<div class="card">
  <div class="stack">
    <div class="specimen"><div class="tag">BODY · 17/Reg</div><div class="t-body">I'll search thousands of stores for you. Just type anything above.</div></div>
    <div class="specimen"><div class="tag">CALLOUT · 16/Reg</div><div class="t-callout">Opens the official store website</div></div>
    <div class="specimen"><div class="tag">SUBHEAD · 15/Reg</div><div class="t-subhead">2,340 results across 47 stores</div></div>
    <div class="specimen"><div class="tag">FOOTNOTE · 13/Reg</div><div class="t-footnote">Updated just now</div></div>
    <div class="specimen"><div class="tag">CAPTION · 12/Reg</div><div class="t-caption">Found in 18 stores</div></div>
  </div>
</div>
</body></html>
